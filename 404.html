<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Page Not Found</title>
    <meta
      name="description"
      content="The page you are looking for could not be found."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500&family=Syne:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/global.css?v=1779484322684" />
    <link rel="stylesheet" href="css/404.css?v=1779484322684" />
    <script>
      if (history.scrollRestoration) history.scrollRestoration = "manual";
    </script>
  </head>
  <body>
    <div class="bg-grid"></div>

    <div class="section-tracker" aria-hidden="true">
      <span class="tracker-section">ERROR</span>
      <span class="tracker-index">404</span>
    </div>

    <div class="cursor" aria-hidden="true">
      <div class="cursor-dot"></div>
      <div class="cursor-cross-h"></div>
      <div class="cursor-cross-v"></div>
    </div>

    <main>
      <section class="not-found" data-section="NOT FOUND" data-index="404">
        <div class="not-found__cascade" aria-hidden="true">
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
        </div>

        <div class="not-found__content">
          <p class="not-found__msg">
            The page you are looking for<br />could not be found.
          </p>
        </div>
        <a href="index.html" class="not-found__btn" data-cursor="expand"
          >BACK TO HOME <span class="arrow">↘</span></a
        >
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js?v=1779484322684"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js?v=1779484322684"></script>
    <script src="js/global.js?v=1779484322684"></script>
    <script src="js/404.js?v=1779484322684"></script>
  </body>
</html>
