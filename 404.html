<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    ┌─────────────────────────────────────┐
    │                                     │
    │   so you went looking.              │
    │                                     │
    │   A N U R A G   M A H A P A T R A   │
    │   SOFTWARE DEVELOPER                │
    │                                     │
    │   built by hand                     │
    │   just html, css and vanilla js     │
    │   animated with gsap and lenis      │
    │                                     │
    │   ianurag.site                      │
    │   github.com/IAnuragMahapatra       │
    │                                     │
    │   hope it holds up under            │
    │   inspection.                       │
    │                                     │
    └─────────────────────────────────────┘
    -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <style>html.js-loading body{opacity:0}html{background:oklch(10% 0 0)}</style>
    <title>Page Not Found</title>
    <meta
      name="description"
      content="The page you are looking for could not be found."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.ianurag.site" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.ianurag.site" />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500&family=Syne:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/global.css?v=1780577368382" />
    <link rel="stylesheet" href="css/404.css?v=1780577368382" />
    <script>
      if (history.scrollRestoration) history.scrollRestoration = "manual";
      document.documentElement.classList.add("js-loading");
    </script>
  </head>
  <body>
    <div class="print-only">
      <div class="print-tree">🌳</div>
      <div class="print-art">Save a tree.</div>
      <div class="print-message">
        This portfolio was made to be interactive.<br />
        Save the paper and experience it online.
      </div>
      <div class="print-url">ianurag.site</div>
    </div>

    <div class="bg-grid"></div>

    <div class="section-tracker" aria-hidden="true">
      <span class="tracker-section">ERROR</span>
      <span class="tracker-index">404</span>
    </div>

    <div class="cursor" aria-hidden="true">
      <div class="cursor-dot"></div>
      <div class="cursor-cross-h"></div>
      <div class="cursor-cross-v"></div>
    </div>

    <main>
      <section class="not-found" data-section="NOT FOUND" data-index="404">
        <div class="not-found__cascade" aria-hidden="true">
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
          <div class="not-found__layer">404</div>
        </div>

        <div class="not-found__content">
          <p class="not-found__msg">
            The page you are looking for<br />could not be found.
          </p>
        </div>
        <a href="index.html" class="not-found__btn" data-cursor="expand"
          >BACK TO HOME <span class="arrow">↘</span></a
        >
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.39/dist/lenis.min.js?v=1780577368382"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js?v=1780577368382"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js?v=1780577368382"></script>

    <script src="js/global.js?v=1780577368382"></script>
    <script src="js/404.js?v=1780577368382"></script>
  </body>
</html>
